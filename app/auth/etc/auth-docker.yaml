Name: auth.rpc
ListenOn: 0.0.0.0:8080

IdentityRpc:
  Target: identity:8081

BizRedis:
  Host: redis:6379
  Pass: "redis"
  DB: 0

JwtAuth:
  AccessSecret: zephyr-admin-secret-key-2026
  AccessExpire: 86400

Log:
  ServiceName: auth-rpc
  Mode: file
  Encoding: json
  Path: /app/logs/auth
  Level: info
  KeepDays: 7
  Compress: true
  MaxBackups: 14
  MaxSize: 50
  Stat: false

