syntax = "proto3";

package identity;

option go_package = "./pb";

// --- Base ---
message EmptyReq {}
message SuccessResp {
    bool success = 1;
}

// --- Auth & Current User ---
message GetUserAuthInfoReq {
    string username = 1;
    string tenant_code = 2; 
}
message GetUserAuthInfoResp {
    string user_code = 1;
    string password_hash = 2;
    string tenant_code = 3;
    int32  status = 4;
}

message GetUserInfoReq {
    string user_code = 1;
    string tenant_code = 2;
}
message UserEntity {
    string user_code = 1;
    string username = 2;
    string avatar = 3;
}
message GetUserInfoResp {
    UserEntity user = 1;
    repeated string roles = 2;
    repeated string perms = 3; 
}

// --- Dept ---
message DeptDetail {
    string id = 1;
    string code = 2;
    string parent_code = 3;
    int32 leaf = 4;
    string dept_name = 5;
    int32 order_num = 6;
    int32 status = 7;
    string create_time = 8;
    repeated DeptDetail children = 9;
}
message DeptTreeResp {
    repeated DeptDetail list = 1;
}
message DeptSaveReq {
    string code = 1;
    string parent_code = 2;
    string dept_name = 3;
    int32 order_num = 4;
    int32 status = 5;
}
message DeptUpdateReq {
    string id = 1;
    string code = 2;
    string parent_code = 3;
    string dept_name = 4;
    int32 order_num = 5;
    int32 status = 6;
}
message DeptRemoveReq {
    repeated string ids = 1;
}

// --- Post ---
message PostPageReq {
    int32 current = 1;
    int32 size = 2;
    string post_name = 3;
    int32 status = 4;
}
message PostDetail {
    int64 id = 1;
    string code = 2;
    string post_name = 3;
    int32 order_num = 4;
    int32 status = 5;
    string create_time = 6;
}
message PostPageResp {
    int64 total = 1;
    repeated PostDetail records = 2;
    int32 size = 3;
    int32 current = 4;
    int32 pages = 5;
}
message PostSaveReq {
    string code = 1;
    string post_name = 2;
    int32 order_num = 3;
    int32 status = 4;
}
message PostUpdateReq {
    int64 id = 1;
    string code = 2;
    string post_name = 3;
    int32 order_num = 4;
    int32 status = 5;
}
message PostStatusReq {
    string code = 1;
    int32 status = 2;
}
message PostRemoveReq {
    repeated string codes = 1;
}

// --- Menu ---
message MenuDetail {
    string menu_code = 1;
    string parent_code = 2;
    string menu_name = 3;
    string icon = 4;
    string menu_type = 5;
    string perms = 6;
    string path = 7;
    string component = 8;
    int32 order_num = 9;
    repeated MenuDetail children = 10;
}
message MenuTreeResp {
    repeated MenuDetail list = 1;
}

// --- Role ---
message RolePageReq {
    int32 current = 1;
    int32 size = 2;
    string role_name = 3;
    int32 status = 4;
}
message RoleDetail {
    string id = 1;
    string code = 2;
    string role_name = 3;
    int32 role_sort = 4;
    int32 status = 5;
    string create_time = 6;
    string remark = 7;
}
message RolePageResp {
    int64 total = 1;
    repeated RoleDetail records = 2;
    int32 size = 3;
    int32 current = 4;
    int32 pages = 5;
}
message RoleSubmitReq {
    string id = 1;
    string code = 2;
    string role_name = 3;
    int32 order_num = 4;
    int32 status = 5;
    string remark = 6;
}
message RoleUpdateStatusReq {
    string id = 1;
    int32 status = 2;
}
message RoleRemoveReq {
    repeated string ids = 1;
}

// --- User ---
message UserListReq {
    string username = 1;
    string real_name = 2;
    string phone = 3;
    int32 status = 4;
    string dept_code = 5;
}
message UserDetail {
    string id = 1;
    string code = 2;
    string username = 3;
    string real_name = 4;
    string phone = 5;
    string email = 6;
    int32 sex = 7;
    string dept_id = 8;
    string dept_name = 9;
    int32 status = 10;
    string avatar = 11;
    repeated string role_codes = 12;
    string create_time = 13;
}
message UserListResp {
    repeated UserDetail list = 1;
}
message UserSubmitReq {
    string id = 1;
    string code = 2;
    string nick_name = 3;
    string real_name = 4;
    string phone = 5;
    string email = 6;
    string dept_code = 7;
    int32 sex = 8;
    int32 status = 9;
}
message UserUpdateStatusReq {
    string id = 1;
    int32 status = 2;
}
message UserResetPasswordReq {
    string id = 1;
}
message UserRemoveReq {
    repeated string ids = 1;
}

// --- 服务定义 ---
service IdentityService {
    rpc GetUserAuthInfo(GetUserAuthInfoReq) returns (GetUserAuthInfoResp);
    rpc GetUserInfo(GetUserInfoReq) returns (GetUserInfoResp);
    
    // Dept
    rpc DeptTree(EmptyReq) returns (DeptTreeResp);
    rpc DeptSave(DeptSaveReq) returns (SuccessResp);
    rpc DeptUpdate(DeptUpdateReq) returns (SuccessResp);
    rpc DeptRemove(DeptRemoveReq) returns (SuccessResp);
    
    // Post
    rpc PostPage(PostPageReq) returns (PostPageResp);
    rpc PostSave(PostSaveReq) returns (SuccessResp);
    rpc PostUpdate(PostUpdateReq) returns (SuccessResp);
    rpc PostRemove(PostRemoveReq) returns (SuccessResp);
    rpc PostStatus(PostStatusReq) returns (SuccessResp);
    
    // Menu
    rpc MenuTree(EmptyReq) returns (MenuTreeResp);
    
    // Role
    rpc RolePage(RolePageReq) returns (RolePageResp);
    rpc RoleSubmit(RoleSubmitReq) returns (SuccessResp);
    rpc RoleUpdateStatus(RoleUpdateStatusReq) returns (SuccessResp);
    rpc RoleRemove(RoleRemoveReq) returns (SuccessResp);
    
    // User
    rpc UserList(UserListReq) returns (UserListResp);
    rpc UserSubmit(UserSubmitReq) returns (SuccessResp);
    rpc UserUpdateStatus(UserUpdateStatusReq) returns (SuccessResp);
    rpc UserResetPassword(UserResetPasswordReq) returns (SuccessResp);
    rpc UserRemove(UserRemoveReq) returns (SuccessResp);
}
